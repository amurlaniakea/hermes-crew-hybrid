version: "3.9"

services:
  crew:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./scripts:/scripts:ro
      - ./output:/output
    network_mode: "none"
    mem_limit: 512m
    cpus: 1.0
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=100m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
