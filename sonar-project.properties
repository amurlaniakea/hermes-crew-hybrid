# SonarCloud configuration for hermes-crew-hybrid
# SPDX-FileCopyrightText: 2026 Pedro Sordo Martínez <amurlaniakea@gmail.com>
# SPDX-License-Identifier: AGPL-3.0-or-later

sonar.projectKey=amurlaniakea_hermes-crew-hybrid
sonar.organization=amurlaniakea
sonar.projectName=hermes-crew-hybrid
sonar.projectVersion=0.1.0

# Source
sonar.sources=.
sonar.exclusions=**/__pycache__/**,**/*.pyc,venv/**,.pytest_cache/**,node_modules/**,consolidate.py

# Tests
sonar.test.inclusions=test_*.py

# Python specific
sonar.language=py
sonar.python.version=3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
